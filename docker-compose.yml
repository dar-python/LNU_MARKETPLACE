services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./laravel-backend:/var/www
    env_file:
      - ./laravel-backend/.env
    environment:
      RUN_MIGRATIONS: "0" # set to "1" if you want auto-migrate on boot (dev only)
    depends_on:
      - db
    networks:
      - lnu_net

  web:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./laravel-backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lnu_net

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: lnu_marketplace
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - lnu_db_data:/var/lib/mysql
    networks:
      - lnu_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8083:80"
    depends_on:
      - db
    networks:
      - lnu_net


networks:
  lnu_net:

volumes:
  lnu_db_data:
