<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LNU Admin Login</title>
    <style>
        :root {
            color-scheme: light;
            --navy: #10245f;
            --navy-deep: #0a153f;
            --gold: #f3c94a;
            --bg: #eef3ff;
            --panel: #ffffff;
            --muted: #5f6b8a;
            --danger: #b42318;
            --danger-bg: #fef3f2;
            --border: #d7def2;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #f9fbff 0%, var(--bg) 45%, #dfe8ff 100%);
            color: var(--navy-deep);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: min(100%, 420px);
            background: var(--panel);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(16, 36, 95, 0.16);
            border: 1px solid rgba(215, 222, 242, 0.9);
        }
        .badge {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(243, 201, 74, 0.18);
            color: var(--navy);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        h1 {
            margin: 16px 0 8px;
            font-size: 30px;
            line-height: 1.1;
        }
        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.5;
        }
        label {
            display: block;
            margin: 16px 0 8px;
            font-size: 14px;
            font-weight: 700;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 15px;
        }
        input:focus {
            outline: 2px solid rgba(16, 36, 95, 0.18);
            border-color: var(--navy);
        }
        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 14px;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            font-weight: 600;
            color: var(--muted);
        }
        button {
            width: 100%;
            margin-top: 20px;
            border: 0;
            border-radius: 14px;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--gold), #e5b825);
            color: var(--navy-deep);
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
        .alert {
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            margin-top: 14px;
        }
        .alert-error {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #fecdca;
        }
        .alert-status {
            background: #eff8ff;
            color: #175cd3;
            border: 1px solid #b2ddff;
        }
        .helper {
            margin-top: 18px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">LNU Marketplace</span>
        <h1>Admin Sign In</h1>
        <p>Use your admin email or student ID to open the moderation dashboard.</p>

        
        
        <form method="POST" action="http://127.0.0.1:8082/admin/login">
            <input type="hidden" name="_token" value="tFfBxz4q1R0hZNEacG4EmlAyO1AjB0bXV0eJ4NTG" autocomplete="off">            <label for="login">Email or Student ID</label>
            <input id="login" type="text" name="login" value="" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>

            <div class="row">
                <label class="checkbox" for="remember">
                    <input id="remember" type="checkbox" name="remember" value="1">
                    Keep me signed in
                </label>
            </div>

            <button type="submit">Open Admin Dashboard</button>
        </form>

        <div class="helper">
            Use an administrator email or student ID that has the <strong>admin</strong> role assigned.
        </div>
    </main>
</body>
</html>
